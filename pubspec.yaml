name: d_rocket
description: >-
  Dart/Flutter data-layer framework: @Serializable codegen,
  @RestClient with retry, deferred LINQ, and a code-first
  engine-agnostic ORM with pluggable backends
  (d_rocket_engine_sqlite, d_rocket_engine_postgres,
  d_rocket_engine_web).
version: 2.0.0

repository: https://github.com/torogoz-tech/d_rocket
homepage: https://github.com/torogoz-tech/d_rocket
issue_tracker: https://github.com/torogoz-tech/d_rocket/issues
documentation: https://github.com/torogoz-tech/d_rocket#readme

topics:
  - linq
  - orm
  - codegen
  - framework
  - engine-agnostic

environment:
  sdk: ^3.6.0
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.17.0
  http: ^1.2.2
  crypto: ^3.0.5
  # Note: `package:sqlite3` is intentionally NOT a
  # direct dependency of d_rocket core. It lives in
  # `d_rocket_engine_sqlite` and is only pulled in
  # when the consumer opts into the SQLite engine.
  # Consumers who only need serialization, REST,
  # LINQ, sync, or realtime never download
  # `libsqlite3`.
  #
  # The `d_rocket:migration` CLI subcommands that
  # actually need a SQLite engine (`run` /
  # `status` / `rollback`) generate a worker Dart
  # file that runs in the user's project graph
  # (see `lib/src/cli/migration_check.dart`).
  # The user's `pubspec.yaml` is what supplies
  # `d_rocket_engine_sqlite` at worker runtime;
  # `d_rocket` itself stays engine-agnostic and
  # has no hard dep on any engine package. This
  # keeps the dependency graph acyclic: the
  # engines depend on `d_rocket`, never the
  # other way around.

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  lints: ^6.0.0
  test: ^1.30.0
  d_rocket_builder: ^2.0.0
  build_runner: ^2.10.3
  # `d_rocket_engine_sqlite` is a dev-only
  # dependency: the engine-agnostic runtime
  # stays free of any engine package, but the
  # test suite in `test/` exercises the ORM
  # against a real SQLite provider. End-users
  # who import `d_rocket` never see this
  # dep and never download `package:sqlite3`.
  d_rocket_engine_sqlite: ^2.0.0

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

flutter:

executables:
  migration:
  closure:
