name: d_rocket
description: >-
  Dart/Flutter data-layer framework: @Serializable codegen,
  @RestClient with retry, deferred LINQ, and a code-first
  engine-agnostic ORM with pluggable backends
  (d_rocket_engine_sqlite, d_rocket_engine_postgres,
  d_rocket_engine_web).
version: 2.0.0

repository: https://github.com/torogoz-tech/d_rocket
homepage: https://github.com/torogoz-tech/d_rocket
issue_tracker: https://github.com/torogoz-tech/d_rocket/issues
documentation: https://github.com/torogoz-tech/d_rocket#readme

topics:
  - linq
  - orm
  - codegen
  - framework
  - engine-agnostic

environment:
  sdk: ^3.6.0
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.17.0
  http: ^1.2.2
  crypto: ^3.0.5
  # Note: `package:sqlite3` is intentionally NOT a
  # direct dependency of d_rocket core. It lives in
  # `d_rocket_engine_sqlite` and is only pulled in
  # when the consumer opts into the SQLite engine.
  # Consumers who only need serialization, REST,
  # LINQ, sync, or realtime never download
  # `libsqlite3`.
  #
  # The `d_rocket:migration` CLI does need
  # `d_rocket_engine_sqlite` to apply migrations
  # (the `run` / `status` / `rollback` subcommands
  # need a real provider). The `add` / `list` /
  # `doctor` subcommands are engine-agnostic and
  # work without the engine. We accept the
  # `d_rocket` → `d_rocket_engine_sqlite` →
  # `sqlite3` dependency chain for the CLI as a
  # known limitation; consumers who never call
  # `d_rocket:migration run` still pay the cost
  # of the libsqlite3 binary, but only at the
  # binary level (the code path is dead). A
  # future 2.1 release will split the migration
  # CLI into a `d_rocket:migration` (scaffolder)
  # and a `d_rocket_engine_sqlite:migration`
  # (runtime) executable to remove this dep.
  d_rocket_engine_sqlite: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  lints: ^6.0.0
  test: ^1.30.0
  d_rocket_builder: ^2.0.0
  build_runner: ^2.10.3

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

flutter:

executables:
  migration:
  closure:
