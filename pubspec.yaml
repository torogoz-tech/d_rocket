name: d_rocket
description: >
  Dart/Flutter data-layer framework: @Serializable codegen,
  @RestClient with retry, deferred LINQ, and a code-first
  SQLite ORM with migrations. See README for platform support.
version: 1.0.0

repository: https://github.com/torogoz-tech/d_rocket
homepage: https://github.com/torogoz-tech/d_rocket
issue_tracker: https://github.com/torogoz-tech/d_rocket/issues
documentation: https://github.com/torogoz-tech/d_rocket#readme

topics:
  - serialization
  - rest
  - linq
  - orm
  - sqlite
  - migration
  - codegen
  - flutter
  - framework

environment:
  sdk: ^3.6.0
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.17.0
  http: ^1.2.2
  sqlite3: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  lints: ^6.0.0
  test: ^1.30.0
  d_rocket_builder: ^1.0.0
  build_runner: ^2.10.3

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

flutter:

executables:
  migration:
  closure:
